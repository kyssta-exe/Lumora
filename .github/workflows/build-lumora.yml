name: Build Lumora

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      MC_VERSION: "1.21.11"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Configure Git
        run: |
          git config --global user.email "no-reply@github.com"
          git config --global user.name "GitHub Actions"

      - name: Apply patches
        run: |
          ./gradlew applyAllPatches --stacktrace --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseG1GC"

      - name: Rebrand Leaf → Lumora
        run: |
          set +e
          echo "=== Starting rebrand ==="

          # Step 1: Rename files containing "Leaf" in their name to "Lumora"
          echo "Renaming files..."
          find . -path "*/src/*" -name "*Leaf*.java" -not -name "*Lumora*" | while read f; do
            newf=$(echo "$f" | sed 's/Leaf/Lumora/g')
            mv "$f" "$newf"
            echo "  Renamed: $(basename $f) -> $(basename $newf)"
          done

          # Step 2: Rename files containing "leaf" in package paths
          find . -path "*/src/*" -name "*leaf*.java" -not -name "*lumora*" | while read f; do
            newf=$(echo "$f" | sed 's/leaf/lumora/g')
            mkdir -p "$(dirname $newf)"
            mv "$f" "$newf"
            echo "  Renamed: $(basename $f) -> $(basename $newf)"
          done

          # Step 3: Replace class/type references inside Java files
          echo "Replacing class references..."
          find . -path "*/src/*" -name "*.java" -exec sed -i \
            -e 's/LeafCustomPayload/LumoraCustomPayload/g' \
            -e 's/PermissionedLeafSubcommand/PermissionedLumoraSubcommand/g' \
            -e 's/LeafSubcommand/LumoraSubcommand/g' \
            -e 's/LeafCommand/LumoraCommand/g' \
            -e 's/LeafCommands/LumoraCommands/g' \
            -e 's/LeafConfig/LumoraConfig/g' \
            -e 's/LeafGlobalConfig/LumoraGlobalConfig/g' \
            -e 's/LeafConstants/LumoraConstants/g' \
            -e 's/LeafVersionFetcher/LumoraVersionFetcher/g' \
            -e 's/LeafSparkPlugin/LumoraSparkPlugin/g' \
            -e 's/LeafServerConfigProvider/LumoraServerConfigProvider/g' \
            -e 's/LeafLitterBlock/LumoraLitterBlock/g' \
            -e 's/REPORT TO LEAF/REPORT TO LUMORA/g' \
            -e 's/"Leaf"/"Lumora"/g' \
            {} + 2>/dev/null

          # Step 4: Also rename package directories leaf -> lumora
          find . -type d -name "leaf" -path "*/dreeam/*" | while read d; do
            newd=$(dirname "$d")/lumora
            if [ ! -d "$newd" ]; then
              mv "$d" "$newd"
              echo "  Renamed dir: leaf -> lumora"
            fi
          done

          echo "=== Rebrand complete ==="

      - name: Build server JAR
        run: |
          ./gradlew createMojmapPaperclipJar --stacktrace --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseG1GC"

      - name: Find built JAR
        id: findjar
        run: |
          JAR=$(find . -name "*.jar" -path "*/build/libs/*" ! -name "*sources*" ! -name "*dev*" | head -1)
          echo "jar_path=$JAR" >> $GITHUB_OUTPUT
          echo "Found JAR: $JAR"
          ls -lh "$JAR"

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumora-${{ env.MC_VERSION }}
          path: ${{ steps.findjar.outputs.jar_path }}
          retention-days: 30
