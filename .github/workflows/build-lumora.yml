name: Build Lumora

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      MC_VERSION: "1.21.11"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Configure Git
        run: |
          git config --global user.email "no-reply@github.com"
          git config --global user.name "GitHub Actions"

      - name: Apply patches
        run: |
          ./gradlew applyAllPatches --stacktrace --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseG1GC"

      - name: Rebrand Leaf → Lumora
        run: |
          # Rebrand in the applied source tree
          SERVER_DIR="lumora-server/minecraft/src/minecraft/java"
          API_DIR="lumora-api/minecraft-api/src/main/java"

          if [ -d "$SERVER_DIR" ]; then
            # Crash report rebrand
            find "$SERVER_DIR" -name "CrashReport.java" -exec sed -i \
              's/DO NOT REPORT THIS TO PAPER! REPORT TO LEAF INSTEAD!/DO NOT REPORT THIS TO PAPER! REPORT TO LUMORA INSTEAD!/g' {} +

            # Version string
            find "$SERVER_DIR" -name "MinecraftServer.java" -exec sed -i \
              's/"Leaf"/"Lumora"/g' {} +

            # Server brand
            find "$SERVER_DIR" -name "DedicatedServerProperties.java" -exec sed -i \
              's/Leaf/Lumora/g' {} +
          fi

          # Rebrand comments in all Java files
          find "$SERVER_DIR" "$API_DIR" -name "*.java" 2>/dev/null -exec sed -i \
            's/\/\/ Leaf/\/\/ Lumora/g; s/\* Leaf/\* Lumora/g' {} +

          echo "Rebrand complete"

      - name: Build server JAR
        run: |
          ./gradlew createMojmapPaperclipJar --stacktrace --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseG1GC"

      - name: Find built JAR
        id: findjar
        run: |
          JAR=$(find . -name "*.jar" -path "*/build/libs/*" ! -name "*sources*" ! -name "*dev*" | head -1)
          echo "jar_path=$JAR" >> $GITHUB_OUTPUT
          echo "Found JAR: $JAR"
          ls -lh "$JAR"

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumora-${{ env.MC_VERSION }}
          path: ${{ steps.findjar.outputs.jar_path }}
          retention-days: 30
