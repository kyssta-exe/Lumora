name: Build Lumora

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      MC_VERSION: "1.21.11"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Configure Git
        run: |
          git config --global user.email "no-reply@github.com"
          git config --global user.name "GitHub Actions"

      - name: Apply patches
        run: |
          ./gradlew applyAllPatches --stacktrace --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseG1GC"

      - name: Build server JAR
        run: |
          ./gradlew createMojmapPaperclipJar --stacktrace --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseG1GC"

      - name: Find built JAR
        id: findjar
        run: |
          JAR=$(find . -name "*.jar" -path "*/build/libs/*" ! -name "*sources*" ! -name "*dev*" | head -1)
          echo "jar_path=$JAR" >> $GITHUB_OUTPUT
          echo "Found JAR: $JAR"
          ls -lh "$JAR"

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumora-${{ env.MC_VERSION }}
          path: ${{ steps.findjar.outputs.jar_path }}
          retention-days: 30
