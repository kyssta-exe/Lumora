name: Build Lumora

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      MC_VERSION: "1.21.11"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Configure Git
        run: |
          git config --global user.email "no-reply@github.com"
          git config --global user.name "GitHub Actions"

      - name: Apply patches
        run: |
          ./gradlew applyAllPatches --stacktrace --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseG1GC"

      - name: Rebrand Leaf → Lumora
        run: |
          set +e
          echo "=== Scoped rebrand ==="

          # 1. Move files from org/dreeam/leaf/ to org/dreeam/lumora/
          find . -path "*/dreeam/leaf/*" -name "*.java" | while read f; do
            newf=$(echo "$f" | sed 's|dreeam/leaf/|dreeam/lumora/|g')
            mkdir -p "$(dirname "$newf")"
            mv "$f" "$newf"
          done

          # 2. Fix package declarations
          find . -path "*/dreeam/lumora/*" -name "*.java" -exec sed -i \
            's/package org\.dreeam\.leaf/package org.dreeam.lumora/g' {} + 2>/dev/null

          # 3. Fix ALL references to org.dreeam.leaf across entire codebase
          find . -name "*.java" -exec sed -i \
            's/org\.dreeam\.leaf/org.dreeam.lumora/g' {} + 2>/dev/null

          # 4. Fix class name references (LeafX → LumoraX, NOT Minecraft API names)
          find . -name "*.java" -exec sed -i \
            -e 's/LeafCustomPayload/LumoraCustomPayload/g' \
            -e 's/LeafSubcommand/LumoraSubcommand/g' \
            -e 's/PermissionedLeafSubcommand/PermissionedLumoraSubcommand/g' \
            -e 's/LeafCommand/LumoraCommand/g' \
            -e 's/LeafCommands/LumoraCommands/g' \
            -e 's/LeafConfig/LumoraConfig/g' \
            -e 's/LeafGlobalConfig/LumoraGlobalConfig/g' \
            -e 's/LeafConstants/LumoraConstants/g' \
            -e 's/LeafVersionFetcher/LumoraVersionFetcher/g' \
            -e 's/LeafSparkPlugin/LumoraSparkPlugin/g' \
            -e 's/LeafServerConfigProvider/LumoraServerConfigProvider/g' \
            -e 's/LeafLitterBlock/LumoraLitterBlock/g' \
            -e 's/REPORT TO LEAF/REPORT TO LUMORA/g' \
            {} + 2>/dev/null

          # 5. Rename *Leaf*.java files under dreeam/lumora/ to *Lumora*
          find . -path "*/dreeam/lumora/*" -name "*Leaf*.java" | while read f; do
            newf=$(echo "$f" | sed 's/Leaf/Lumora/g')
            mv "$f" "$newf"
            echo "  Renamed: $(basename $f) -> $(basename $newf)"
          done

          # 6. Fix version brand string in Lumora-specific files only
          find . -path "*/dreeam/lumora/*" -name "*.java" -exec sed -i \
            's/"Leaf"/"Lumora"/g' {} + 2>/dev/null

          # 7. Rename LeafLitterBlock.java → LumoraLitterBlock.java
          find . -name "LeafLitterBlock.java" -exec bash -c '
            dir=$(dirname "$1")
            mv "$1" "$dir/LumoraLitterBlock.java"
            echo "  Renamed LeafLitterBlock.java -> LumoraLitterBlock.java"
          ' _ {} \;

          # 7. Rename PermissionedLeafSubcommand.java if it exists
          PLSC=$(find . -path "*/dreeam/*" -name "PermissionedLeafSubcommand.java" | head -1)
          if [ -n "$PLSC" ]; then
            mv "$PLSC" "$(dirname $PLSC)/PermissionedLumoraSubcommand.java"
          fi

          echo "=== Rebrand complete ==="

      - name: Build server JAR
        run: |
          ./gradlew createMojmapPaperclipJar --stacktrace --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseG1GC"

      - name: Find built JAR
        id: findjar
        run: |
          JAR=$(find . -name "*.jar" -path "*/build/libs/*" ! -name "*sources*" ! -name "*dev*" | head -1)
          echo "jar_path=$JAR" >> $GITHUB_OUTPUT
          echo "Found JAR: $JAR"
          ls -lh "$JAR"

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumora-${{ env.MC_VERSION }}
          path: ${{ steps.findjar.outputs.jar_path }}
          retention-days: 30
